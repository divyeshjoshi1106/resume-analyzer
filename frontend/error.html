<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analysis Error</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="error">
  <main class="page">
    <section class="card error-card">
      <div class="error-icon" aria-hidden="true">⚠️</div>
      <h1 class="error-title">Unable to Analyze Resume</h1>
      <p class="subtitle">Something went wrong while processing your request.</p>

      <div class="error-message">
        <strong>Details:</strong>
        <p id="error-message-text" class="error-detail-text">An unexpected error occurred.</p>
      </div>

      <div class="actions">
        <button type="button" data-action="home">Return to Home</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
